<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF | Secure Payment</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:radial-gradient(circle at top,#111,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#0d0d0d;
border-radius:25px;
padding:25px;
box-shadow:0 0 50px rgba(255,0,0,.5);
border:1px solid rgba(255,0,0,.3);
}

.brand{
text-align:center;
font-size:22px;
font-weight:bold;
color:#ff1a1a;
text-shadow:0 0 10px red;
margin-bottom:20px;
}

.amount{
text-align:center;
font-size:26px;
color:#00ffcc;
font-weight:bold;
margin-bottom:15px;
}

.methodBox{
display:flex;
gap:10px;
margin-bottom:15px;
}

.methodBtn{
flex:1;
padding:12px;
border:none;
border-radius:15px;
font-weight:bold;
cursor:pointer;
color:white;
}

.bkash{background:linear-gradient(45deg,#ff0055,#ff0000);}
.nagad{background:linear-gradient(45deg,#ff6600,#ff3300);}

.numberCard{
display:none;
margin-top:15px;
padding:15px;
background:#000;
border-radius:15px;
border:1px solid red;
text-align:center;
font-size:18px;
letter-spacing:1px;
box-shadow:0 0 15px rgba(255,0,0,.4);
}

input{
width:100%;
padding:14px;
margin-top:15px;
border-radius:14px;
border:none;
background:#000;
color:white;
border:1px solid #333;
}

.verifyBtn{
width:100%;
padding:15px;
margin-top:18px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#ff0000,#990000);
color:white;
font-weight:bold;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:#111;
padding:25px;
border-radius:20px;
text-align:center;
width:90%;
max-width:350px;
border:1px solid red;
box-shadow:0 0 40px red;
}

.keyBox{
margin-top:15px;
padding:10px;
background:#000;
border-radius:10px;
border:1px solid red;
font-weight:bold;
color:#00ffcc;
}

.actionBtn{
margin-top:12px;
padding:10px;
border:none;
border-radius:12px;
background:red;
color:white;
width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="brand">🔥 ArenaXFF</div>

<div class="amount" id="amountText"></div>

<div class="methodBox">
<button class="methodBtn bkash" onclick="selectMethod('bKash')">Pay with bKash</button>
<button class="methodBtn nagad" onclick="selectMethod('Nagad')">Pay with Nagad</button>
</div>

<div class="numberCard" id="numberCard"></div>

<input id="trx" placeholder="Enter Transaction ID">

<button class="verifyBtn" onclick="verifyPayment()">VERIFY PAYMENT</button>

</div>

<div class="popup" id="popup">
<div class="popupBox" id="popupContent">
<h3 id="statusText">Checking Payment...</h3>
</div>
</div>

<script>
const products = {
item120:{price:120},
item250:{price:250},
item755:{price:755}
};

const id = new URLSearchParams(window.location.search).get("id");

if(products[id]){
document.getElementById("amountText").innerText =
"Amount: ৳"+products[id].price;
}

function selectMethod(method){
document.getElementById("numberCard").style.display="block";
document.getElementById("numberCard").innerHTML =
"Send ৳"+products[id].price+" to<br><b>01861316505</b><br>via "+method;
}

function verifyPayment(){
let trx=document.getElementById("trx").value;

if(trx===""){
alert("Enter Transaction ID");
return;
}

document.getElementById("popup").style.display="flex";

setTimeout(()=>{
generateKey();
},3000);
}

function generateKey(){
let key="AXF-"+Math.random().toString(36).substring(2,10).toUpperCase();

document.getElementById("popupContent").innerHTML=
`
<h3>Payment Submitted</h3>
<p>Here is your key</p>
<div class="keyBox" id="keyText">${key}</div>
<button class="actionBtn" onclick="copyKey()">Copy Key</button>
<button class="actionBtn" onclick="goBot()">Go To Bot</button>
`;
}

function copyKey(){
let text=document.getElementById("keyText").innerText;
navigator.clipboard.writeText(text);
alert("Key Copied");
}

function goBot(){
window.location.href="https://t.me/yourbotusername";
}
</script>

</body>
</html>
