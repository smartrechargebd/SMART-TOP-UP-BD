<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF | Payment</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:radial-gradient(circle at top,#111,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#0d0d0d;
border-radius:25px;
padding:25px;
box-shadow:0 0 40px rgba(255,0,0,.4);
border:1px solid rgba(255,0,0,.3);
}

.brand{
text-align:center;
font-size:24px;
font-weight:bold;
color:#ff0000;
letter-spacing:2px;
margin-bottom:20px;
}

.selectBox{
text-align:center;
margin-bottom:20px;
}

.methodBtn{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.bkash{
background:linear-gradient(45deg,#ff0055,#ff0000);
color:white;
}

.nagad{
background:linear-gradient(45deg,#ff6600,#ff3300);
color:white;
}

.methodBtn:hover{
transform:scale(1.05);
}

.paymentBox{
display:none;
margin-top:20px;
}

.amount{
font-size:26px;
text-align:center;
margin:10px 0;
color:#ff3333;
font-weight:bold;
}

.number{
background:#111;
padding:12px;
border-radius:12px;
text-align:center;
margin-bottom:15px;
border:1px solid #ff0000;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:14px;
border:none;
background:#111;
color:white;
border:1px solid #333;
}

.verifyBtn{
width:100%;
padding:15px;
margin-top:18px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#ff0000,#990000);
color:white;
font-weight:bold;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:#111;
padding:25px;
border-radius:20px;
text-align:center;
width:90%;
max-width:350px;
border:1px solid #ff0000;
box-shadow:0 0 30px rgba(255,0,0,.5);
}

.key{
font-size:20px;
color:#00ff99;
margin:15px 0;
letter-spacing:2px;
}

.copyBtn{
background:#00ff99;
color:black;
padding:10px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.botBtn{
background:#0088cc;
color:white;
padding:10px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="brand">🔥 ArenaXFF</div>

<div class="selectBox">
<h3>Select Payment Method</h3>
<button class="methodBtn bkash" onclick="selectMethod('bkash')">Pay with bKash</button>
<button class="methodBtn nagad" onclick="selectMethod('nagad')">Pay with Nagad</button>
</div>

<div class="paymentBox" id="paymentBox">

<div class="amount" id="amountText"></div>
<div class="number" id="numberText"></div>

<input placeholder="Your In-Game Name">
<input placeholder="Transaction ID">

<button class="verifyBtn" onclick="verifyPayment()">VERIFY PAYMENT</button>

</div>

</div>

<div class="popup" id="popup">
<div class="popupBox">
<h3>Payment Under Review</h3>
<p>Your Verification Key:</p>
<div class="key" id="keyText"></div>
<button class="copyBtn" onclick="copyKey()">Copy Key</button>
<button class="botBtn" onclick="goToBot()">Go To Bot</button>
</div>
</div>

<script>

const products = {
item120:{price:120},
item250:{price:250},
item755:{price:755},
item1500:{price:1500}
};

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");
const product = products[id];

let selectedMethod = "";

function selectMethod(method){
selectedMethod = method;
document.getElementById("paymentBox").style.display="block";
document.getElementById("amountText").innerText = "৳"+product.price;
document.getElementById("numberText").innerText =
method==="bkash" ? "Send Money To: 01861316505 (bKash)" :
"Send Money To: 01861316505 (Nagad)";
}

function generateKey(){
return "AXFF"+Math.random().toString(36).substring(2,8).toUpperCase();
}

function verifyPayment(){
const key = generateKey();
document.getElementById("keyText").innerText = key;
document.getElementById("popup").style.display="flex";
}

function copyKey(){
navigator.clipboard.writeText(
document.getElementById("keyText").innerText
);
alert("Key Copied");
}

function goToBot(){
window.location.href="https://t.me/YOUR_BOT_USERNAME";
}

</script>

</body>
</html>
