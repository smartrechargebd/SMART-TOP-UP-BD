<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF | Secure Payment</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#111,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

/* MAIN CONTAINER */

.container{
width:100%;
max-width:420px;
background:#0d0d0d;
border-radius:25px;
padding:25px;
box-shadow:0 0 50px rgba(255,0,0,.6);
border:1px solid rgba(255,0,0,.4);
}

/* BRAND */

.brand{
text-align:center;
font-size:22px;
font-weight:bold;
color:#ff1a1a;
text-shadow:0 0 10px red;
margin-bottom:15px;
}

/* AMOUNT */

.amount{
text-align:center;
font-size:26px;
color:#00ffcc;
font-weight:bold;
margin-bottom:18px;
}

/* METHOD BUTTONS */

.methodBox{
display:flex;
gap:10px;
margin-bottom:15px;
}

.methodBtn{
flex:1;
padding:12px;
border:none;
border-radius:15px;
font-weight:bold;
cursor:pointer;
color:white;
transition:.3s;
}

.bkash{
background:linear-gradient(45deg,#ff0055,#ff0000);
}

.nagad{
background:linear-gradient(45deg,#ff6600,#ff3300);
}

.methodBtn:hover{
transform:scale(1.05);
}

/* NUMBER CARD */

.numberCard{
display:none;
margin-top:15px;
padding:18px;
background:#000;
border-radius:15px;
border:2px solid red;
text-align:center;
box-shadow:0 0 20px rgba(255,0,0,.5);
}

.payNumber{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
color:#ffffff;
}

.payNote{
margin-top:6px;
font-size:12px;
color:#aaa;
letter-spacing:1px;
}

/* INPUT */

input{
width:100%;
padding:14px;
margin-top:15px;
border-radius:14px;
border:none;
background:#000;
color:white;
border:1px solid #333;
font-size:14px;
}

/* VERIFY BUTTON */

.verifyBtn{
width:100%;
padding:15px;
margin-top:18px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#ff0000,#990000);
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.verifyBtn:hover{
transform:scale(1.05);
box-shadow:0 0 25px red;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:#111;
padding:25px;
border-radius:20px;
text-align:center;
width:90%;
max-width:350px;
border:1px solid red;
box-shadow:0 0 40px red;
}

.keyBox{
margin-top:15px;
padding:10px;
background:#000;
border-radius:10px;
border:1px solid red;
font-weight:bold;
color:#00ffcc;
}

.actionBtn{
margin-top:12px;
padding:10px;
border:none;
border-radius:12px;
background:red;
color:white;
width:100%;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="brand">🔥 ArenaXFF</div>

<div class="amount" id="amountText"></div>

<div class="methodBox">
<button class="methodBtn bkash" onclick="selectMethod()">Pay with bKash</button>
<button class="methodBtn nagad" onclick="selectMethod()">Pay with Nagad</button>
</div>

<div class="numberCard" id="numberCard"></div>

<input id="trx" placeholder="Enter Transaction ID">

<button class="verifyBtn" onclick="verifyPayment()">VERIFY PAYMENT</button>

</div>

<!-- POPUP -->

<div class="popup" id="popup">
<div class="popupBox" id="popupContent">
<h3>Checking Payment...</h3>
</div>
</div>

<script>

/* PRODUCTS */

const products = {
item120:{price:120},
item250:{price:250},
item755:{price:755}
};

const id = new URLSearchParams(window.location.search).get("id");

if(products[id]){
document.getElementById("amountText").innerText =
"Amount: ৳"+products[id].price;
}

/* SHOW NUMBER */

function selectMethod(){
document.getElementById("numberCard").style.display="block";

document.getElementById("numberCard").innerHTML=
`
<div class="payNumber">01861316505</div>
<div class="payNote">Send Money / Cash In</div>
`;
}

/* VERIFY */

function verifyPayment(){

let trx=document.getElementById("trx").value;

if(trx===""){
alert("Enter Transaction ID");
return;
}

document.getElementById("popup").style.display="flex";

setTimeout(()=>{
generateKey();
},3000);

}

/* GENERATE KEY */

function generateKey(){

let key="AXF-"+Math.random().toString(36).substring(2,10).toUpperCase();

document.getElementById("popupContent").innerHTML=
`
<h3>Payment Submitted</h3>
<p>Your Key:</p>
<div class="keyBox" id="keyText">${key}</div>
<button class="actionBtn" onclick="copyKey()">Copy Key</button>
<button class="actionBtn" onclick="goBot()">Go To Bot</button>
`;

}

function copyKey(){
let text=document.getElementById("keyText").innerText;
navigator.clipboard.writeText(text);
alert("Key Copied");
}

function goBot(){
window.location.href="https://t.me/yourbotusername";
}

</script>

</body>
</html>
