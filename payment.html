<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Fire Top Up</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:radial-gradient(circle at top,#111,#000);
color:white;
padding:40px 20px;
min-height:100vh;
}

.wrapper{
max-width:420px;
margin:auto;
}

.card{
background:rgba(20,20,20,.9);
padding:25px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,150,255,.4);
border:2px solid rgba(0,150,255,.4);
}

h3{
color:#00e5ff;
margin-bottom:10px;
}

.price{
color:#00ff99;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

input{
width:100%;
padding:14px;
margin-top:14px;
border:none;
border-radius:12px;
background:#111;
color:white;
border:1px solid #00e5ff;
}

input::placeholder{
color:#777;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:bold;
cursor:pointer;
margin-top:16px;
font-size:15px;
background:linear-gradient(45deg,#00e5ff,#2979ff);
color:white;
box-shadow:0 0 15px rgba(0,150,255,.6);
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.key-box{
margin-top:25px;
padding:20px;
background:#000;
border-radius:15px;
display:none;
text-align:center;
border:1px solid #00ff99;
box-shadow:0 0 20px rgba(0,255,150,.5);
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 15px rgba(0,255,150,.5);}
to{box-shadow:0 0 30px rgba(0,255,150,1);}
}

.key-box h2{
color:#00ff99;
letter-spacing:2px;
margin:10px 0;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="card">

<h3>🔥 Free Fire Top Up</h3>
<div id="productInfo"></div>

<p style="margin-top:15px;"><b>bKash / Nagad:</b> 01861316505</p>

<input id="name" placeholder="Your In-Game Name">
<input id="trx" placeholder="Transaction ID">

<button onclick="confirmOrder()">Confirm Payment</button>

<div class="key-box" id="keyBox"></div>

</div>
</div>

<script type="module">
import { db, doc, getDoc, collection, addDoc } from "./firebase.js";

if(sessionStorage.getItem("role")!=="user"){
window.location="index.html";
}

let productId=sessionStorage.getItem("selectedProductId");
let productRef=doc(db,"products",productId);
let productSnap=await getDoc(productRef);
let product=productSnap.data();
let basePrice=parseInt(product.price);

document.getElementById("productInfo").innerHTML=
"<h4>"+product.title+"</h4>"+
"<p class='price'>৳"+basePrice+"</p>";

function generateKey(){
return "FF"+Math.random().toString(36).substring(2,8).toUpperCase();
}

window.confirmOrder=async function(){

let name=document.getElementById("name").value.trim();
let trx=document.getElementById("trx").value.trim();
let user=sessionStorage.getItem("user");

if(!name || !trx){
alert("Fill all fields");
return;
}

let key=generateKey();

await addDoc(collection(db,"orders"),{
username:user,
name:name,
product:product.title,
price:basePrice,
trx:trx,
key:key,
status:"pending",
date:new Date()
});

document.getElementById("keyBox").style.display="block";
document.getElementById("keyBox").innerHTML=
"<b>🎉 TOP UP REQUEST RECEIVED</b><br><br>"+
"Your Verification Key:<br>"+
"<h2>"+key+"</h2>"+
"Copy this key and paste it in Telegram Bot.";

}
</script>

</body>
</html>
