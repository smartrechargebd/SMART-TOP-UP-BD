<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF | Payment</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:Segoe UI;
background:radial-gradient(circle at top,#111,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}
.container{
width:100%;
max-width:420px;
background:#0d0d0d;
border-radius:25px;
padding:25px;
box-shadow:0 0 40px rgba(255,0,0,.4);
border:1px solid rgba(255,0,0,.3);
}
.brand{
text-align:center;
font-size:24px;
font-weight:bold;
color:#ff0000;
margin-bottom:20px;
}
.methodBtn{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}
.bkash{
background:linear-gradient(45deg,#ff0055,#ff0000);
color:white;
}
.nagad{
background:linear-gradient(45deg,#ff6600,#ff3300);
color:white;
}
.paymentBox{
display:none;
margin-top:20px;
}
.amount{
font-size:26px;
text-align:center;
margin:10px 0;
color:#ff3333;
font-weight:bold;
}
.number{
background:#111;
padding:12px;
border-radius:12px;
text-align:center;
margin-bottom:15px;
border:1px solid #ff0000;
}
.error{
color:red;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="brand">🔥 ArenaXFF</div>

<h3>Select Payment Method</h3>

<button class="methodBtn bkash" onclick="selectMethod('bkash')">Pay with bKash</button>
<button class="methodBtn nagad" onclick="selectMethod('nagad')">Pay with Nagad</button>

<div class="paymentBox" id="paymentBox">
<div class="amount" id="amountText"></div>
<div class="number" id="numberText"></div>
</div>

<div class="error" id="errorText"></div>

</div>

<script>

const products = {
item120:{price:120},
item250:{price:250},
item755:{price:755},
item1500:{price:1500}
};

const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

if(!id || !products[id]){
document.getElementById("errorText").innerText =
"Product not found. Please go back and select product again.";
}

function selectMethod(method){

if(!products[id]){
return;
}

document.getElementById("paymentBox").style.display="block";

document.getElementById("amountText").innerText =
"Amount: ৳"+products[id].price;

document.getElementById("numberText").innerText =
method==="bkash"
? "Send Money To: 01861316505 (bKash)"
: "Send Money To: 01861316505 (Nagad)";
}

</script>

</body>
</html>
