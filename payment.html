<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Payment - Smart Recharge BD</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="payment-body">

<div class="payment-box">

<h2>Complete Payment</h2>

<div id="productInfo"></div>

<div class="payment-info">
Send Money to: <b>01861316505</b><br>
(bKash / Nagad)
</div>

<input type="text" id="customerName" placeholder="Your Name">
<input type="text" id="trxId" placeholder="Transaction ID">
<input type="text" id="coupon" placeholder="Coupon Code (Optional)">

<button onclick="confirmPayment()">Confirm Payment</button>
<button class="back-btn" onclick="goBack()">Back</button>

</div>

<script type="module">

import { db, collection, addDoc, doc, getDoc } from "./firebase.js";

if(sessionStorage.getItem("role") !== "user"){
    window.location.href = "index.html";
}

const productId = sessionStorage.getItem("selectedProductId");

if(!productId){
    window.location.href = "home.html";
}

const productRef = doc(db,"products",productId);
const productSnap = await getDoc(productRef);
const productData = productSnap.data();

let finalPrice = parseFloat(productData.price);

document.getElementById("productInfo").innerHTML = `
<h3>${productData.title}</h3>
<p>${productData.details}</p>
<p><b>Price:</b> ৳<span id="priceValue">${finalPrice}</span></p>
`;

window.confirmPayment = async function(){

    const name = document.getElementById("customerName").value.trim();
    const trx = document.getElementById("trxId").value.trim();
    const coupon = document.getElementById("coupon").value.trim();

    if(!name || !trx){
        alert("Fill all fields");
        return;
    }

    // Coupon Logic
    let discount = 0;
    if(coupon === "SR50"){
        discount = finalPrice * 0.5;
    }

    const payAmount = finalPrice - discount;

    // Save Order to Firebase
    await addDoc(collection(db,"orders"),{
        name: name,
        product: productData.title,
        price: payAmount,
        trx: trx,
        date: new Date()
    });

    const message =
`New Order Confirmed!

Name: ${name}
Product: ${productData.title}
Price: ৳${payAmount}
Transaction ID: ${trx}`;

    window.location.href =
    "https://wa.me/8801607254046?text=" + encodeURIComponent(message);
}

window.goBack = function(){
    window.location.href = "home.html";
}

</script>

</body>
</html>
