<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF Payment</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:radial-gradient(circle at top,#1a0000,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.box{
width:90%;
max-width:420px;
background:#0d0d0d;
border:1px solid red;
border-radius:20px;
padding:25px;
box-shadow:0 0 40px rgba(255,0,0,.4);
}

h2{
text-align:center;
color:red;
text-shadow:0 0 15px red;
}

.amount{
text-align:center;
font-size:22px;
margin-bottom:15px;
color:#00ff99;
}

.payBox{
background:#000;
border:1px solid red;
padding:12px;
border-radius:10px;
margin-bottom:12px;
text-align:center;
}

.number{
font-size:18px;
font-weight:bold;
}

.small{
font-size:12px;
color:#aaa;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
cursor:pointer;
background:red;
color:white;
}

.methodBtn{
background:#111;
border:1px solid red;
}

.selected{
background:red !important;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #333;
background:#000;
color:white;
margin-top:8px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="box">

<h2>🔥 ArenaXFF</h2>

<div class="amount">Amount: ৳<span id="finalPrice">120</span></div>

<div class="payBox">
<div class="number" id="payNumber">01861316505</div>
<button onclick="copyNumber()">Copy Number</button>
<div class="small">Send Money / Cash In</div>
</div>

<button class="methodBtn" id="bkashBtn" onclick="selectMethod('bkash')">
Pay with bKash
</button>

<button class="methodBtn" id="nagadBtn" onclick="selectMethod('nagad')">
Pay with Nagad
</button>

<div id="selectedText" class="small" style="margin-top:6px;"></div>

<input id="couponInput" placeholder="Enter Coupon Code">
<button onclick="applyCoupon()">Apply Coupon</button>

<input id="trxInput" placeholder="Enter Transaction ID">
<button onclick="submitPayment()">VERIFY PAYMENT</button>

<div id="processing" class="hidden">Checking Payment...</div>

<div id="keySection" class="hidden">
<p>Your Key:</p>
<b id="generatedKey"></b>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKaUhhUIANTMux62xhNFyXdct8xdyzvfg",
  authDomain: "smartrechargebd-eed74.firebaseapp.com",
  projectId: "smartrechargebd-eed74",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let basePrice = 120;
let finalPrice = 120;
let selectedMethod = "";

window.selectMethod = function(method){

selectedMethod = method;

document.getElementById("bkashBtn").classList.remove("selected");
document.getElementById("nagadBtn").classList.remove("selected");

if(method==="bkash"){
document.getElementById("bkashBtn").classList.add("selected");
selectedText.innerText = "bKash Selected";
}else{
document.getElementById("nagadBtn").classList.add("selected");
selectedText.innerText = "Nagad Selected";
}

}

window.applyCoupon = async function(){

let code = couponInput.value.trim().toUpperCase();

const q = query(collection(db,"coupons"), where("code","==",code));
const snap = await getDocs(q);

if(snap.empty){
alert("Invalid Coupon");
return;
}

snap.forEach(docSnap=>{
let data = docSnap.data();

if(data.used >= data.usageLimit){
alert("Coupon Limit Reached");
return;
}

finalPrice = basePrice - data.value;
if(finalPrice < 0) finalPrice = 0;

finalPriceSpan = document.getElementById("finalPrice");
finalPriceSpan.innerText = finalPrice;

alert("Coupon Applied");
});

}

window.submitPayment = async function(){

if(!selectedMethod){
alert("Select Payment Method");
return;
}

let trx = trxInput.value.trim();

if(!trx){
alert("Enter Transaction ID");
return;
}

processing.classList.remove("hidden");

const q = query(collection(db,"orders"), where("transactionId","==",trx));
const existing = await getDocs(q);

if(!existing.empty){
processing.classList.add("hidden");
alert("Transaction ID already used");
return;
}

let key = "AXFF-" + Math.random().toString(36).substring(2,8).toUpperCase();

await addDoc(collection(db,"orders"),{
productName: "Free Fire 120 Diamond",
price: finalPrice,
paymentMethod: selectedMethod,
transactionId: trx,
generatedKey: key,
status: "pending",
createdAt: Date.now()
});

processing.classList.add("hidden");

generatedKey.innerText = key;
keySection.classList.remove("hidden");

}

window.copyNumber = function(){
navigator.clipboard.writeText("01861316505");
alert("Number Copied");
}

</script>

</body>
</html>
