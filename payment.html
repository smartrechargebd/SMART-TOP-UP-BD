<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF | Secure Payment</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#111,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:#0d0d0d;
border-radius:25px;
padding:25px;
box-shadow:0 0 50px rgba(255,0,0,.6);
border:1px solid rgba(255,0,0,.4);
}

.brand{
text-align:center;
font-size:22px;
font-weight:bold;
color:#ff1a1a;
text-shadow:0 0 15px red;
margin-bottom:18px;
}

.amount{
text-align:center;
font-size:26px;
color:#00ffcc;
font-weight:bold;
margin-bottom:20px;
}

.methodBox{
display:flex;
gap:10px;
margin-bottom:15px;
}

.methodBtn{
flex:1;
padding:13px;
border:none;
border-radius:15px;
font-weight:bold;
cursor:pointer;
color:white;
transition:.3s;
font-size:14px;
}

.bkash{background:linear-gradient(45deg,#ff0055,#ff0000);}
.nagad{background:linear-gradient(45deg,#ff6600,#ff3300);}

.active{
box-shadow:0 0 20px #00ffcc;
transform:scale(1.05);
}

.numberCard{
display:none;
margin-top:15px;
padding:20px;
background:#000;
border-radius:15px;
border:2px solid red;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,.5);
}

.numberRow{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.payNumber{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

.copyBtn{
padding:5px 10px;
font-size:11px;
border:none;
border-radius:8px;
background:red;
color:white;
cursor:pointer;
}

.payNote{
margin-top:6px;
font-size:12px;
color:#aaa;
}

.selectedText{
margin-top:6px;
font-size:12px;
color:#00ffcc;
}

input{
width:100%;
padding:14px;
margin-top:18px;
border-radius:14px;
border:none;
background:#000;
color:white;
border:1px solid #333;
}

.verifyBtn{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#ff0000,#990000);
color:white;
font-weight:bold;
cursor:pointer;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:#111;
padding:25px;
border-radius:20px;
text-align:center;
width:90%;
max-width:350px;
border:1px solid red;
box-shadow:0 0 40px red;
}

.keyBox{
margin-top:15px;
padding:12px;
background:#000;
border-radius:10px;
border:1px solid red;
font-weight:bold;
color:#00ffcc;
}

.actionBtn{
margin-top:12px;
padding:12px;
border:none;
border-radius:12px;
background:red;
color:white;
width:100%;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="brand">🔥 ArenaXFF</div>
<div class="amount" id="amountText"></div>

<div class="methodBox">
<button class="methodBtn bkash" id="bkashBtn" onclick="selectMethod('bKash')">Pay with bKash</button>
<button class="methodBtn nagad" id="nagadBtn" onclick="selectMethod('Nagad')">Pay with Nagad</button>
</div>

<div class="numberCard" id="numberCard"></div>

<input id="trx" placeholder="Enter Transaction ID">

<button class="verifyBtn" onclick="verifyPayment()">VERIFY PAYMENT</button>

</div>

<div class="popup" id="popup">
<div class="popupBox" id="popupContent">
<h3>Checking Payment...</h3>
</div>
</div>

<script>

const products={
item120:{price:120},
item250:{price:250},
item755:{price:755}
};

const id=new URLSearchParams(window.location.search).get("id");

if(products[id]){
document.getElementById("amountText").innerText=
"Amount: ৳"+products[id].price;
}

function selectMethod(method){

document.getElementById("bkashBtn").classList.remove("active");
document.getElementById("nagadBtn").classList.remove("active");

if(method==="bKash"){
document.getElementById("bkashBtn").classList.add("active");
}else{
document.getElementById("nagadBtn").classList.add("active");
}

document.getElementById("numberCard").style.display="block";

document.getElementById("numberCard").innerHTML=`
<div class="numberRow">
<div class="payNumber" id="numberText">01861316505</div>
<button class="copyBtn" onclick="copyNumber()">Copy</button>
</div>
<div class="payNote">Send Money / Cash In</div>
<div class="selectedText">${method} Selected</div>
`;

}

function copyNumber(){
let text=document.getElementById("numberText").innerText;
navigator.clipboard.writeText(text);
alert("Number Copied");
}

function verifyPayment(){

let trx=document.getElementById("trx").value;

if(trx===""){
alert("Enter Transaction ID");
return;
}

document.getElementById("popup").style.display="flex";

setTimeout(()=>{
generateKey();
},3000);

}

function generateKey(){
let key="AXF-"+Math.random().toString(36).substring(2,10).toUpperCase();

document.getElementById("popupContent").innerHTML=`
<h3>Payment Submitted</h3>
<p>Your Key:</p>
<div class="keyBox" id="keyText">${key}</div>
<button class="actionBtn" onclick="copyKey()">Copy Key</button>
<button class="actionBtn" onclick="goBot()">Go To Bot</button>
`;
}

function copyKey(){
let text=document.getElementById("keyText").innerText;
navigator.clipboard.writeText(text);
alert("Key Copied");
}

function goBot(){
window.location.href="https://t.me/yourbotusername";
}

</script>

</body>
</html>
