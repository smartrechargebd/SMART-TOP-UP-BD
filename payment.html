<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF Payment</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:radial-gradient(circle at top,#1a0000,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
}

.title{
text-align:center;
color:red;
font-size:22px;
text-shadow:0 0 15px red;
margin-bottom:15px;
}

.amount{
text-align:center;
font-size:20px;
margin-bottom:15px;
color:#00ff99;
}

.payBox{
background:#000;
border:1px solid red;
border-radius:12px;
padding:15px;
text-align:center;
margin-bottom:15px;
box-shadow:0 0 25px rgba(255,0,0,.4);
}

.numberRow{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.number{
font-size:20px;
font-weight:bold;
}

.copyBtn{
font-size:12px;
padding:5px 8px;
background:red;
border:none;
border-radius:5px;
cursor:pointer;
}

.neon{
font-size:12px;
color:#00ffff;
margin-top:5px;
}

.selectedText{
font-size:12px;
color:#00ff99;
margin-top:5px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#111;
color:white;
margin-bottom:8px;
cursor:pointer;
border:1px solid red;
}

button.active{
background:red;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #333;
background:#000;
color:white;
margin-bottom:8px;
}

.verifyBtn{
background:red;
border:none;
}

.hidden{
display:none;
}

.keyBox{
margin-top:10px;
background:#000;
border:1px solid #00ff99;
padding:12px;
border-radius:8px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🔥 ArenaXFF</div>

<div class="amount">
Amount: ৳<span id="finalPrice">120</span>
</div>

<div class="payBox">

<div class="numberRow">
<div class="number">01861316505</div>
<button class="copyBtn" onclick="copyNumber()">Copy</button>
</div>

<div class="neon">Send Money / Cash In</div>
<div id="selectedText" class="selectedText"></div>

</div>

<button id="bkashBtn" onclick="selectMethod('bkash')">
Pay with bKash
</button>

<button id="nagadBtn" onclick="selectMethod('nagad')">
Pay with Nagad
</button>

<input id="couponInput" placeholder="Enter Coupon Code">
<button onclick="applyCoupon()">Apply Coupon</button>

<input id="trxInput" placeholder="Enter Transaction ID">
<button class="verifyBtn" onclick="submitPayment()">VERIFY PAYMENT</button>

<div id="processing" class="hidden">Checking Payment...</div>

<div id="keySection" class="hidden keyBox">
<p>Your Key:</p>
<b id="generatedKey"></b>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKaUhhUIANTMux62xhNFyXdct8xdyzvfg",
  authDomain: "smartrechargebd-eed74.firebaseapp.com",
  projectId: "smartrechargebd-eed74",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let basePrice = 120;
let finalPrice = 120;
let selectedMethod = "";

window.selectMethod = function(method){

selectedMethod = method;

document.getElementById("bkashBtn").classList.remove("active");
document.getElementById("nagadBtn").classList.remove("active");

if(method==="bkash"){
document.getElementById("bkashBtn").classList.add("active");
document.getElementById("selectedText").innerText = "bKash Selected";
}else{
document.getElementById("nagadBtn").classList.add("active");
document.getElementById("selectedText").innerText = "Nagad Selected";
}

}

window.applyCoupon = async function(){

let code = document.getElementById("couponInput").value.trim().toUpperCase();

if(!code){
alert("Enter Coupon Code");
return;
}

const q = query(collection(db,"coupons"), where("code","==",code));
const snap = await getDocs(q);

if(snap.empty){
alert("Invalid Coupon");
return;
}

snap.forEach(docSnap=>{
let data = docSnap.data();

if(data.status !== "active"){
alert("Coupon Not Active");
return;
}

if(data.used >= data.usageLimit){
alert("Coupon Limit Reached");
return;
}

if(data.expiry && Date.now() > data.expiry){
alert("Coupon Expired");
return;
}

finalPrice = basePrice - Number(data.value);
if(finalPrice < 0) finalPrice = 0;

document.getElementById("finalPrice").innerText = finalPrice;

alert("Coupon Applied Successfully");
});

}

window.submitPayment = async function(){

if(!selectedMethod){
alert("Select Payment Method");
return;
}

let trx = document.getElementById("trxInput").value.trim();

if(!trx){
alert("Enter Transaction ID");
return;
}

document.getElementById("processing").classList.remove("hidden");

const q = query(collection(db,"orders"), where("transactionId","==",trx));
const existing = await getDocs(q);

if(!existing.empty){
document.getElementById("processing").classList.add("hidden");
alert("Transaction ID already used");
return;
}

let key = "AXFF-" + Math.random().toString(36).substring(2,8).toUpperCase();

await addDoc(collection(db,"orders"),{
productName: "Free Fire 120 Diamond",
price: finalPrice,
paymentMethod: selectedMethod,
transactionId: trx,
generatedKey: key,
status: "pending",
createdAt: Date.now()
});

document.getElementById("processing").classList.add("hidden");

document.getElementById("generatedKey").innerText = key;
document.getElementById("keySection").classList.remove("hidden");

}

window.copyNumber = function(){
navigator.clipboard.writeText("01861316505");
alert("Number Copied");
}

</script>

</body>
</html>
