<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF Payment</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:radial-gradient(circle at top,#1a0000,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
}

.title{
text-align:center;
color:#ff3c3c;
font-size:24px;
text-shadow:0 0 20px red;
margin-bottom:10px;
}

.amount{
text-align:center;
font-size:20px;
margin-bottom:15px;
color:#00ff99;
}

button{
width:100%;
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:10px;
font-weight:500;
border:none;
}

.methodBtn{
background:#111;
border:1px solid red;
color:white;
}

.methodBtn.active{
background:red;
}

.payBox{
background:#000;
border:1px solid red;
border-radius:15px;
padding:20px;
text-align:center;
margin-bottom:15px;
box-shadow:0 0 30px rgba(255,0,0,.5);
}

.numberRow{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.number{
font-size:22px;
font-weight:bold;
color:#ffcc00; /* PREMIUM GOLD */
letter-spacing:2px;
text-shadow:0 0 10px #ff9900;
}

.copyBtn{
font-size:10px;
padding:4px 8px;
background:#111;
color:#ffcc00;
border:1px solid #ff9900;
border-radius:5px;
cursor:pointer;
}

.neon{
font-size:12px;
color:#00ffff;
margin-top:6px;
}

.selectedText{
font-size:12px;
color:#00ff99;
margin-top:5px;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #333;
background:#000;   /* FIX WHITE BUG */
color:white;
margin-bottom:10px;
}

.verifyBtn{
background:red;
color:white;
}

.hidden{
display:none;
}

.keyBox{
margin-top:10px;
background:#000;
border:1px solid #00ff99;
padding:12px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🔥 ArenaXFF</div>

<div class="amount">
Amount: ৳<span id="finalPrice">120</span>
</div>

<button id="bkashBtn" class="methodBtn" onclick="selectMethod('bkash')">
Pay with bKash
</button>

<button id="nagadBtn" class="methodBtn" onclick="selectMethod('nagad')">
Pay with Nagad
</button>

<div class="payBox">

<div class="numberRow">
<div class="number">01861316505</div>
<button class="copyBtn" onclick="copyNumber()">Copy</button>
</div>

<div class="neon">Send Money / Cash In</div>
<div id="selectedText" class="selectedText"></div>

</div>

<input id="couponInput" placeholder="Enter Coupon Code">
<button onclick="applyCoupon()">Apply Coupon</button>

<input id="trxInput" placeholder="Enter Transaction ID">
<button class="verifyBtn" onclick="submitPayment()">VERIFY PAYMENT</button>

<div id="processing" class="hidden">Checking Payment...</div>

<div id="keySection" class="hidden keyBox">
<p>Your Key:</p>
<b id="generatedKey"></b>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKaUhhUIANTMux62xhNFyXdct8xdyzvfg",
  authDomain: "smartrechargebd-eed74.firebaseapp.com",
  projectId: "smartrechargebd-eed74",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let basePrice = 120;
let finalPrice = 120;
let selectedMethod = "";

window.selectMethod = function(method){
selectedMethod = method;
document.getElementById("bkashBtn").classList.remove("active");
document.getElementById("nagadBtn").classList.remove("active");

if(method==="bkash"){
document.getElementById("bkashBtn").classList.add("active");
document.getElementById("selectedText").innerText="bKash Selected";
}else{
document.getElementById("nagadBtn").classList.add("active");
document.getElementById("selectedText").innerText="Nagad Selected";
}
}

window.applyCoupon = async function(){

let code=document.getElementById("couponInput").value.trim().toUpperCase();

if(!code){
alert("Enter Coupon Code");
return;
}

const q=query(collection(db,"coupons"),where("code","==",code));
const snap=await getDocs(q);

if(snap.empty){
alert("Invalid Coupon");
return;
}

snap.forEach(async(docSnap)=>{
let data=docSnap.data();

if(data.status!=="active"){
alert("Coupon Not Active");
return;
}

if(data.used>=data.usageLimit){
alert("Coupon Limit Reached");
return;
}

finalPrice=basePrice-Number(data.value);
if(finalPrice<0) finalPrice=0;

document.getElementById("finalPrice").innerText=finalPrice;

await updateDoc(doc(db,"coupons",docSnap.id),{
used:data.used+1
});

alert("Coupon Applied Successfully");
});
}

window.submitPayment=async function(){

if(!selectedMethod){
alert("Select Payment Method");
return;
}

let trx=document.getElementById("trxInput").value.trim();

if(!trx){
alert("Enter Transaction ID");
return;
}

document.getElementById("processing").classList.remove("hidden");

let key="AXFF-"+Math.random().toString(36).substring(2,8).toUpperCase();

await addDoc(collection(db,"orders"),{
price:finalPrice,
paymentMethod:selectedMethod,
transactionId:trx,
generatedKey:key,
status:"pending",
createdAt:Date.now()
});

document.getElementById("processing").classList.add("hidden");
document.getElementById("generatedKey").innerText=key;
document.getElementById("keySection").classList.remove("hidden");

}

window.copyNumber=function(){
navigator.clipboard.writeText("01861316505");
alert("Number Copied");
}

</script>

</body>
</html>
