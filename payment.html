<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#000,#0f0f0f,#111);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:25px;
padding:25px;
box-shadow:0 0 40px rgba(0,255,255,0.3);
border:1px solid rgba(255,255,255,0.1);
animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.9);}
to{opacity:1;transform:scale(1);}
}

.logo{
text-align:center;
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.method{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.price{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

.numberBox{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
font-size:18px;
letter-spacing:1px;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:14px;
background:rgba(0,0,0,0.7);
color:white;
border:1px solid rgba(255,255,255,0.2);
}

button{
width:100%;
padding:15px;
margin-top:18px;
border:none;
border-radius:18px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>
<body>

<div class="container">

<div class="logo">🔥 SMART TOP UP BD</div>

<div class="method" id="methodTitle"></div>
<div class="price" id="priceText"></div>

<div class="numberBox" id="paymentNumber"></div>

<input placeholder="Your Game Name">
<input placeholder="Transaction ID">

<button id="confirmBtn">VERIFY PAYMENT</button>

</div>

<script>

const products = {
ff2500:{title:"2500 Diamond",price:1500},
ffmonthly:{title:"Free Fire Monthly",price:755},
ff1000:{title:"1000 Diamond",price:650}
};

const urlParams = new URLSearchParams(window.location.search);
const method = urlParams.get("method");
const id = urlParams.get("id");

const product = products[id];

document.getElementById("priceText").innerText = "৳" + product.price;
document.getElementById("paymentNumber").innerText =
method === "bkash" ? "bKash: 01861316505" : "Nagad: 01861316505";

document.getElementById("methodTitle").innerText =
method === "bkash" ? "bKash Payment" : "Nagad Payment";

if(method==="bkash"){
document.getElementById("confirmBtn").style.background=
"linear-gradient(45deg,#ff0066,#ff3399)";
}else{
document.getElementById("confirmBtn").style.background=
"linear-gradient(45deg,#ff6600,#ff9900)";
}

</script>

</body>
</html>
