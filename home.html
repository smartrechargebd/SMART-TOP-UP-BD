<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
min-height:100vh;
min-height:100dvh;
background:#0f2027;
overflow-x:hidden;
}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#16222a,#203a43);
color:white;
padding:20px;
}

/* Force full screen */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(135deg,#0f2027,#16222a,#203a43);
z-index:-1;
}

/* ===== TOP BAR ===== */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
font-size:14px;
opacity:.9;
}

.logo-wrap{
display:flex;
align-items:center;
gap:10px;
}

.logo-img{width:40px;}

.logout{
background:#ff1744;
border:none;
padding:6px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* ===== RATING ===== */
.rating{
margin-bottom:20px;
font-size:14px;
opacity:.9;
}

/* ===== PRODUCT GRID ===== */
.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.07);
border-radius:18px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,255,150,.2);
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 35px rgba(0,255,150,.4);
}

.product-img{
width:100%;
height:160px;
object-fit:cover;
}

.content{padding:18px;}

.badge{
position:absolute;
top:12px;
right:12px;
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.hot{background:#ff1744;}
.offer{background:#ff9100;}

.price{
color:#00ff99;
font-weight:bold;
margin-top:8px;
}

.buy{
margin-top:12px;
background:#00e676;
border:none;
padding:10px;
border-radius:10px;
width:100%;
font-weight:bold;
cursor:pointer;
}

/* ===== LIVE POPUP ===== */
.live-popup{
position:fixed;
bottom:20px;
left:20px;
background:rgba(0,0,0,.8);
padding:12px 15px;
border-radius:12px;
font-size:13px;
display:none;
z-index:99;
}

/* ===== RESPONSIVE ===== */
@media(max-width:500px){
body{padding:15px;}
}
</style>
