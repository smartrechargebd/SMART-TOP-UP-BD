<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF | Gaming Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:radial-gradient(circle at top,#111,#000);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
color:#ff0000;
letter-spacing:2px;
}

.products{
max-width:500px;
margin:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.card{
background:#0d0d0d;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 25px rgba(255,0,0,.3);
border:1px solid rgba(255,0,0,.2);
transition:.3s;
}

.card:hover{
transform:scale(1.02);
box-shadow:0 0 40px rgba(255,0,0,.6);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card h3{
color:#ff4444;
margin-bottom:5px;
}

.price{
font-weight:bold;
color:#00ffcc;
margin-bottom:10px;
}

.buyBtn{
display:block;
text-align:center;
padding:12px;
background:linear-gradient(45deg,#ff0000,#990000);
border-radius:12px;
color:white;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<header>🔥 ArenaXFF</header>

<div class="products">

<div class="card">
<img src="images/item120.jpg">
<div class="card-body">
<h3>Free Fire Item Pack</h3>
<div class="price">৳120</div>
<a class="buyBtn" href="payment.html?id=item120">BUY NOW</a>
</div>
</div>

<div class="card">
<img src="images/diamond250.jpg">
<div class="card-body">
<h3>Diamond Pack</h3>
<div class="price">৳250</div>
<a class="buyBtn" href="payment.html?id=item250">BUY NOW</a>
</div>
</div>

<div class="card">
<img src="images/monthly.jpg">
<div class="card-body">
<h3>Monthly Membership</h3>
<div class="price">৳755</div>
<a class="buyBtn" href="payment.html?id=item755">BUY NOW</a>
</div>
</div>

</div>

</body>
</html>
