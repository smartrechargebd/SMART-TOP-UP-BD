<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Smart Recharge BD - Home</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="home-body">

<!-- TOP BAR -->
<div class="top-bar">

    <div class="logo-wrap">
        <img src="https://i.postimg.cc/Qxr6kM5f/8E06F917-7C4C-42E5-B43F-B792C3410617.png" class="small-logo">
        <span class="brand-name">Smart Recharge BD</span>
    </div>

    <button class="logout-btn" onclick="logout()">Logout</button>

</div>

<!-- ORDER COUNTER -->
<div id="orderCounter" class="rating">
Total Orders: Loading...
</div>

<!-- PRODUCT GRID -->
<div id="productContainer" class="product-grid"></div>

<script type="module">

import { db, collection, getDocs } from "./firebase.js";

// Secure Access
if(sessionStorage.getItem("role") !== "user"){
    window.location.href = "index.html";
}

const productContainer = document.getElementById("productContainer");
const orderCounter = document.getElementById("orderCounter");

// Load Products
async function loadProducts(){

    productContainer.innerHTML = `
    <div style="text-align:center;padding:30px;opacity:.7">
    Loading products...
    </div>
    `;

    const snapshot = await getDocs(collection(db,"products"));
    productContainer.innerHTML = "";

    if(snapshot.empty){
        productContainer.innerHTML = `
        <div style="text-align:center;padding:30px;opacity:.7">
        No products available.
        </div>
        `;
        return;
    }

    snapshot.forEach(docSnap => {

        const data = docSnap.data();

        productContainer.innerHTML += `
        <div class="card">

            <img src="${data.image}" class="product-img">

            <div class="card-content">

                <h3>${data.title}</h3>

                <p>${data.details}</p>

                <div class="price">৳${data.price}</div>

                <button onclick="buyProduct('${docSnap.id}')">
                Buy Now
                </button>

            </div>

        </div>
        `;
    });
}

// Load Order Counter
async function loadOrderCount(){
    const snapshot = await getDocs(collection(db,"orders"));
    orderCounter.innerText = "Total Orders: " + snapshot.size;
}

// Buy Product
window.buyProduct = function(id){
    sessionStorage.setItem("selectedProductId", id);
    window.location.href = "payment.html";
}

// Logout
window.logout = function(){
    sessionStorage.clear();
    window.location.href = "index.html";
}

loadProducts();
loadOrderCount();

</script>

</body>
</html>
