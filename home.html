<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
height:100%;
min-height:100vh;
min-height:100dvh;
background:#0f2027;
overflow-x:hidden;
}

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0f2027,#16222a,#203a43);
color:white;
padding:20px;
}

/* Top */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.logo-wrap{
display:flex;
align-items:center;
gap:10px;
}

.logo-img{width:38px;}

.logout{
background:#ff1744;
border:none;
padding:6px 12px;
border-radius:8px;
color:white;
cursor:pointer;
}

/* Rating */
.rating{
margin-bottom:20px;
opacity:.9;
}

/* Grid */
.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.07);
border-radius:18px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,255,150,.2);
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 35px rgba(0,255,150,.4);
}

.product-img{
width:100%;
height:170px;
object-fit:cover;
}

.content{padding:18px;}

.badge{
position:absolute;
top:12px;
right:12px;
padding:4px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

.hot{background:#ff1744;}
.offer{background:#ff9100;}

.price{
color:#00ff99;
font-weight:bold;
margin-top:8px;
}

.buy{
margin-top:12px;
background:#00e676;
border:none;
padding:10px;
border-radius:10px;
width:100%;
font-weight:bold;
cursor:pointer;
}

/* Live popup */
.live-popup{
position:fixed;
bottom:20px;
left:20px;
background:rgba(0,0,0,.8);
padding:12px 15px;
border-radius:12px;
font-size:13px;
display:none;
}
</style>
</head>

<body>

<div class="top-bar">
<div class="logo-wrap">
<img class="logo-img" src="https://i.postimg.cc/Qxr6kM5f/8E06F917-7C4C-42E5-B43F-B792C3410617.png">
<h3>Smart Recharge BD</h3>
</div>

<div>
<span id="orderCount">Orders: 0</span>
<button class="logout" onclick="logout()">Logout</button>
</div>
</div>

<div class="rating">
⭐ 4.8 / 5 (2,349 Reviews)
</div>

<div class="product-grid" id="products"></div>

<div class="live-popup" id="liveBox"></div>

<script type="module">

import { db, collection, getDocs } from "./firebase.js";

if(sessionStorage.getItem("role")!=="user"){
window.location="index.html";
}

async function loadProducts(){
const snapshot=await getDocs(collection(db,"products"));
let box=document.getElementById("products");
box.innerHTML="";

snapshot.forEach(docSnap=>{
let p=docSnap.data();
let id=docSnap.id;

box.innerHTML+=`
<div class="card">
${p.badge?`<div class="badge ${p.badge==='HOT'?'hot':'offer'}">${p.badge}</div>`:""}
<img class="product-img" src="${p.image || 'https://via.placeholder.com/400x200'}">
<div class="content">
<h3>${p.title}</h3>
<p>${p.details || ""}</p>
<p class="price">৳${p.price}</p>
<button class="buy" onclick="buy('${id}')">Buy Now</button>
</div>
</div>
`;
});
}

window.buy=function(id){
sessionStorage.setItem("selectedProductId",id);
window.location="payment.html";
}

window.logout=function(){
sessionStorage.clear();
window.location="index.html";
}

loadProducts();

</script>

</body>
</html>
