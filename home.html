<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF | Official Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI;
background:radial-gradient(circle at top,#0f0f0f,#000);
color:white;
min-height:100vh;
}

header{
text-align:center;
padding:25px 20px;
font-size:28px;
font-weight:bold;
color:#ff1a1a;
letter-spacing:3px;
text-shadow:0 0 15px red;
}

.sub{
text-align:center;
color:#aaa;
margin-bottom:20px;
}

.products{
max-width:500px;
margin:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:25px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 35px rgba(255,0,0,.4);
border:1px solid rgba(255,0,0,.3);
transition:.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 60px rgba(255,0,0,.8);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:18px;
}

.card h3{
color:#ff4444;
margin-bottom:8px;
}

.price{
font-size:20px;
color:#00ffcc;
font-weight:bold;
margin-bottom:12px;
}

.buyBtn{
display:block;
text-align:center;
padding:13px;
background:linear-gradient(45deg,#ff0000,#990000);
border-radius:15px;
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 15px rgba(255,0,0,.6);
}

.stats{
text-align:center;
margin-top:30px;
color:#aaa;
}

footer{
text-align:center;
margin-top:40px;
padding:20px;
color:#444;
}
</style>
</head>

<body>

<header>🔥 ArenaXFF</header>
<div class="sub">Elite Gaming Store</div>

<div class="products">

<div class="card">
<img src="images/item120.jpg">
<div class="card-body">
<h3>Free Fire Item Pack</h3>
<div class="price">৳120</div>
<a class="buyBtn" href="payment.html?id=item120">BUY NOW</a>
</div>
</div>

<div class="card">
<img src="images/diamond250.jpg">
<div class="card-body">
<h3>Diamond Pack</h3>
<div class="price">৳250</div>
<a class="buyBtn" href="payment.html?id=item250">BUY NOW</a>
</div>
</div>

<div class="card">
<img src="images/monthly.jpg">
<div class="card-body">
<h3>Monthly Membership</h3>
<div class="price">৳755</div>
<a class="buyBtn" href="payment.html?id=item755">BUY NOW</a>
</div>
</div>

</div>

<div class="stats">
⭐ 4.9 / 5 (3,000+ Happy Gamers)
</div>

<footer>
© 2026 ArenaXFF Official
</footer>

</body>
</html>
