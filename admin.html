<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF Admin</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#000;
color:white;
}

.header{
text-align:center;
padding:20px;
font-size:24px;
color:red;
text-shadow:0 0 20px red;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#111;
border:1px solid red;
border-radius:15px;
padding:15px;
margin-bottom:15px;
}

button{
padding:8px 12px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.statBox{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.stat{
flex:1;
min-width:150px;
background:#111;
border:1px solid red;
padding:15px;
border-radius:10px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">🔥 ArenaXFF Admin Panel</div>

<div class="container">

<div class="statBox">
<div class="stat">Total Orders<br><span id="totalOrders">0</span></div>
<div class="stat">Pending<br><span id="pendingOrders">0</span></div>
<div class="stat">Revenue<br>৳<span id="totalRevenue">0</span></div>
</div>

<div class="card">
<h3>Orders</h3>
<div id="orderList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKaUhhUIANTMux62xhNFyXdct8xdyzvfg",
  authDomain: "smartrechargebd-eed74.firebaseapp.com",
  projectId: "smartrechargebd-eed74",
  storageBucket: "smartrechargebd-eed74.firebasestorage.app",
  messagingSenderId: "1024026655834",
  appId: "1:1024026655834:web:c3d836eb5fc411cf77ec63"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadOrders(){
const snapshot = await getDocs(collection(db,"orders"));
let total=0,pending=0,revenue=0;
let html="";

snapshot.forEach(docSnap=>{
let data = docSnap.data();
total++;
if(data.status==="pending") pending++;
revenue+=Number(data.price || 0);

html+=`
<div class="card">
<b>${data.productName}</b><br>
৳${data.price}<br>
Status: ${data.status}<br>
<button onclick="approve('${docSnap.id}')">Approve</button>
</div>
`;
});

orderList.innerHTML=html;
totalOrders.innerText=total;
pendingOrders.innerText=pending;
totalRevenue.innerText=revenue;
}

window.approve=async(id)=>{
await updateDoc(doc(db,"orders",id),{
status:"approved"
});
loadOrders();
}

loadOrders();

</script>

</body>
</html>
