<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF</title>

<style>
body{
margin:0;
background:radial-gradient(circle at top,#140000,#000);
font-family:Segoe UI;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.loginBox{
background:#0d0d0d;
padding:35px;
border-radius:25px;
box-shadow:0 0 50px rgba(255,0,0,.6);
border:1px solid rgba(255,0,0,.4);
width:90%;
max-width:420px;
text-align:center;
}

.logo{
font-size:26px;
font-weight:bold;
color:red;
text-shadow:0 0 20px red;
margin-bottom:25px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#000;
color:white;
border:1px solid #333;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:red;
color:white;
cursor:pointer;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="loginBox">

<div class="logo" onclick="logoClick()">🔥 ArenaXFF</div>

<input id="username" placeholder="Enter Username">
<button onclick="userLogin()">ENTER</button>

<div id="adminBox" class="hidden">
<input id="adminPass" type="password" placeholder="Admin Password">
<button onclick="adminLogin()">ADMIN LOGIN</button>
</div>

</div>

<script>

let clickCount=0;
let adminPassword="AXFF2026";

function userLogin(){
if(username.value.trim()==""){
alert("Enter Username");
return;
}
window.location.href="home.html";
}

function logoClick(){
clickCount++;
if(clickCount===3){
document.getElementById("adminBox").classList.remove("hidden");
}
}

function adminLogin(){
if(adminPass.value===adminPassword){
window.location.href="admin.html";
}else{
alert("Wrong Password");
}
}

</script>

</body>
</html>
