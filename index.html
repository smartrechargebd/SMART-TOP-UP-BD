<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Recharge BD</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<div class="login-box">

    <img src="https://i.postimg.cc/Qxr6kM5f/8E06F917-7C4C-42E5-B43F-B792C3410617.png" class="login-logo">

    <h2>Smart Recharge BD</h2>
    <p>Secure Login</p>

    <input type="password" id="loginInput" placeholder="Enter 11 digit mobile or admin password">

    <button onclick="login()">Continue</button>

</div>

<script>
function login(){
    const input = document.getElementById("loginInput").value.trim();

    if(input === "admin@2026@"){
        sessionStorage.setItem("role","admin");
        window.location.href="admin.html";
        return;
    }

    if(/^\d{11}$/.test(input)){
        sessionStorage.setItem("role","user");
        window.location.href="home.html";
        return;
    }

    alert("Invalid Login");
}
</script>

</body>
</html>
