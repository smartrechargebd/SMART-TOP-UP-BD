<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArenaXFF | Login</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:radial-gradient(circle at top,#111,#000);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:420px;
background:#0d0d0d;
padding:30px;
border-radius:25px;
box-shadow:0 0 40px rgba(255,0,0,.6);
border:1px solid rgba(255,0,0,.4);
}

.brand{
text-align:center;
font-size:22px;
color:red;
font-weight:bold;
text-shadow:0 0 15px red;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:12px;
border:none;
background:#000;
color:white;
border:1px solid #333;
}

input:focus{
outline:none;
border:1px solid red;
box-shadow:0 0 10px red;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff0000,#990000);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:5px;
transition:.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 15px red;
}

.orderCard{
background:#000;
padding:15px;
border-radius:15px;
margin-bottom:15px;
border:1px solid red;
font-size:14px;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container" id="loginSection">
<div class="brand">🔥 ArenaXFF</div>
<input type="text" id="username" placeholder="Enter Username">
<button onclick="login()">ENTER</button>
</div>

<div class="container hidden" id="adminSection">
<div class="brand">Admin Dashboard</div>
<div id="ordersList"></div>
<button onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKaUhhUIANTMux62xhNFyXdct8xdyzvfg",
  authDomain: "smartrechargebd-eed74.firebaseapp.com",
  projectId: "smartrechargebd-eed74",
  storageBucket: "smartrechargebd-eed74.firebasestorage.app",
  messagingSenderId: "1024026655834",
  appId: "1:1024026655834:web:c3d836eb5fc411cf77ec63"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = function(){

let user=document.getElementById("username").value.trim();

if(user==="admin"){
document.getElementById("loginSection").classList.add("hidden");
document.getElementById("adminSection").classList.remove("hidden");
loadOrders();
}
else{
window.location.href="home.html";
}

}

window.logout = function(){
location.reload();
}

async function loadOrders(){

const querySnapshot = await getDocs(collection(db, "orders"));

let html="";

querySnapshot.forEach((docSnap)=>{

let data = docSnap.data();
let id = docSnap.id;

html += `
<div class="orderCard">
<b>Product:</b> ${data.productName || "-"}<br>
<b>Amount:</b> ৳${data.price || "-"}<br>
<b>Method:</b> ${data.paymentMethod || "-"}<br>
<b>TRX:</b> ${data.transactionId || "-"}<br>
<b>Key:</b> ${data.generatedKey || "-"}<br>
<b>Status:</b> ${data.status || "-"}<br><br>

<button onclick="approveOrder('${id}')">Approve</button>
<button onclick="rejectOrder('${id}')">Reject</button>
</div>
`;

});

document.getElementById("ordersList").innerHTML = html;

}

window.approveOrder = async function(orderId){
await updateDoc(doc(db,"orders",orderId),{
status:"approved"
});
loadOrders();
}

window.rejectOrder = async function(orderId){
await updateDoc(doc(db,"orders",orderId),{
status:"rejected"
});
loadOrders();
}

</script>

</body>
</html>
